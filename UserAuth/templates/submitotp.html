{% extends "base.html" %}
{% block title %}Submit OTP | Feedback Hub{% endblock title %}
{% block content %}
<div class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-3xl shadow-xl p-8 lg:p-10">

            <!-- Header -->
            <div class="text-center mb-10">
                <div class="mx-auto w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-9 h-9 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l-4 4m0 0l-4-4" />
                    </svg>
                </div>
                <h1 class="text-3xl font-semibold text-slate-900">Enter OTP</h1>
                <p class="text-slate-600 mt-2 text-lg">
                    We've sent a 4-digit verification code to your email {{ user.email }}.
                </p>
            </div>

            <form method="POST" class="space-y-8">
                {% csrf_token %}

                <!-- Single 4-Digit Input (Best without JS) -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-3 text-center">
                        Enter 4-digit OTP
                    </label>
                    <input 
                        type="text" 
                        name="otp"
                        maxlength="4"
                        pattern="[0-9]{4}"
                        required
                        inputmode="numeric"
                        class="w-full text-center text-2xl font-semibold tracking-[12px] 
                               border border-slate-300 rounded-2xl py-2 bg-slate-50 
                               focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="••••"
                    >
                </div>

                <input type="hidden" name="username" value="{{username}}">

                <!-- Verify Button -->
                <button 
                    type="submit"
                    name="submit_otp"
                    class="w-full py-3 bg-blue-600 hover:bg-blue-700 transition-all text-white font-semibold text-lg rounded-2xl shadow-lg shadow-blue-500/30">
                    Verify OTP
                </button>
            </form>

            <!-- Resend Section -->
            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="username" value="{{username}}">
                <div class="text-center mt-8">
                <p class="text-sm text-slate-600">
                    Didn't receive the code? 
                    <button 
                    type="submit"
                    name="resend_otp"
                       class="text-blue-600 hover:text-blue-700 font-medium">
                        Resend OTP
                    </button>
                </p>
                </div>
            </form>

            <!-- Back to Login -->
            <div class="text-center mt-8">
                <a href="{% url 'login' %}" 
                   class="text-slate-500 hover:text-slate-700 text-sm inline-flex items-center gap-1">
                    ← Back to Login
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock content %}
