{% extends "base.html" %}
{% block title %}Thank You | Feedback Hub{% endblock title %}
{% block content %}

<div class="min-h-screen bg-slate-100 flex items-center justify-center px-4 py-10">

    <div class="max-w-lg w-full bg-white rounded-3xl shadow-xl p-10 text-center">

        <!-- Success Icon -->
        <div class="w-20 h-20 mx-auto bg-green-100 rounded-full flex items-center justify-center mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" 
                 class="w-10 h-10 text-green-600" 
                 fill="none" 
                 viewBox="0 0 24 24" 
                 stroke="currentColor"
                 stroke-width="2">
                <path stroke-linecap="round" 
                      stroke-linejoin="round" 
                      d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <!-- Message -->
        <h1 class="text-3xl font-bold text-slate-900">
            Thank You!
        </h1>

        <p class="text-slate-600 mt-3 leading-relaxed">
            Your feedback has been submitted successfully.
        </p>

        <p class="text-sm text-slate-500 mt-2">
            We appreciate your time and response.
        </p>

    </div>

</div>

{% endblock content %}
