{% extends "base.html" %}
{% block title %}Create Form | Feedback Hub{% endblock title %}
{% block content %}

<div class="min-h-screen bg-slate-100 py-10 px-4">

    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl p-8">

        <!-- Header -->
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-900">
                Create Feedback Form
            </h1>
            <p class="text-slate-600 mt-2">
                Create a form and then add questions to collect feedback.
            </p>
        </div>

        <!-- Form -->
        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <!-- Form Title -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    Form Title
                </label>

                <input 
                    type="text"
                    name="title"
                    required
                    placeholder="Example: Student Feedback Form"
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900"
                >
            </div>

            <!-- Description -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    Form Description
                </label>

                <textarea
                    name="description"
                    rows="4"
                    placeholder="Write a short description about this feedback form..."
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 resize-none"
                ></textarea>
            </div>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 pt-4">

                <button 
                    type="submit"
                    class="w-full sm:w-auto px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-2xl transition">
                    Create Form
                </button>

                <a href="{% url 'host_dashboard' %}"
                   class="w-full sm:w-auto px-6 py-3 bg-slate-200 hover:bg-slate-300 text-slate-800 font-semibold rounded-2xl text-center transition">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock content %}
